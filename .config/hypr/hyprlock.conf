# Background
background {
    monitor =
    path = ~/.config/hypr/images/wallpaper.jpg
}

# General
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgb(255, 255, 255)
    font_size = 140
    font_family = SF Pro Display Bold
    position = 0, 220
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    color = rgb(255, 255, 255)
    font_size = 26
    font_family = SF Pro Display Medium
    position = 0, 320
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text =  
    hide_input = false
    position = 0, -250
    halign = center
    valign = center
    zindex = 2
}